<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>食べログ営業ツール ポータル</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600;700;900&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1e293b;--mid:#64748b;--light:#94a3b8;--faint:#e2e8f0;--hairline:#eef2f7;
  --bg:#f4f6fa;--white:#fff;
  --orange:#ea580c;--orange-light:#fed7aa;--orange-pale:#fff7ed;
  --blue:#2563eb;--blue-light:#dbeafe;--blue-pale:#eff6ff;
  --radius:10px;
  --shadow:0 1px 2px rgba(15,23,42,.04),0 1px 3px rgba(15,23,42,.06);
  --ease:cubic-bezier(.16,1,.3,1);
}
body{font-family:'DM Sans','Noto Sans JP',sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;}
.app{max-width:880px;margin:0 auto;padding:56px 16px 80px;}

/* ── HEADER ── */
.app-header{display:flex;align-items:center;gap:14px;margin-bottom:44px;}
.app-icon{width:46px;height:46px;background:var(--orange);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:23px;flex-shrink:0;box-shadow:var(--shadow);}
.app-title{font-size:21px;font-weight:700;letter-spacing:-.02em;}
.app-sub{font-size:12.5px;color:var(--mid);margin-top:3px;}

/* ── TOOL CARDS ── */
.tools{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media(max-width:640px){.tools{grid-template-columns:1fr;}}
.tool-card{position:relative;width:100%;background:var(--white);border:1px solid var(--faint);border-radius:14px;box-shadow:var(--shadow);padding:24px 22px;transition:border-color .15s var(--ease), transform .1s var(--ease), box-shadow .15s var(--ease);}
.tool-card:hover{border-color:var(--orange);box-shadow:0 6px 20px rgba(234,88,12,.12);transform:translateY(-1px);}
.tool-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;margin-bottom:16px;}
.tool-icon.research{background:var(--orange-pale);border:1px solid var(--orange-light);}
.tool-icon.attack{background:var(--blue-pale);border:1px solid var(--blue-light);}
.tool-name{font-size:16px;font-weight:700;letter-spacing:-.01em;margin-bottom:6px;}
.tool-link{color:inherit;text-decoration:none;}
.tool-link::after{content:"";position:absolute;inset:0;border-radius:inherit;}
.tool-desc{font-size:12.5px;color:var(--mid);line-height:1.7;margin-bottom:16px;}
.tool-freq{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:700;color:var(--mid);background:var(--bg);border:1px solid var(--faint);border-radius:8px;padding:4px 9px;margin-bottom:16px;}
.tool-freq .dot{width:6px;height:6px;border-radius:50%;background:var(--green,#16a34a);flex-shrink:0;}
.pref-row{position:relative;z-index:1;display:flex;gap:6px;flex-wrap:wrap;padding-top:14px;border-top:1px solid var(--hairline);}
.pref-link{font-size:11px;font-weight:600;color:var(--mid);text-decoration:none;padding:5px 10px;border-radius:7px;border:1px solid var(--faint);background:var(--bg);white-space:nowrap;}
.pref-link:hover{border-color:var(--orange);color:var(--orange);background:var(--orange-pale);}

/* ── OTHER ── */
.other{margin-top:36px;padding-top:24px;border-top:1px solid var(--hairline);}
.other-label{font-size:10.5px;font-weight:700;color:var(--light);letter-spacing:.05em;margin-bottom:10px;}
.other-link{display:inline-flex;align-items:center;gap:8px;font-size:12.5px;font-weight:600;color:var(--mid);text-decoration:none;background:var(--white);border:1px solid var(--faint);border-radius:9px;padding:9px 14px;}
.other-link:hover{border-color:var(--orange);color:var(--orange);}

.footer{margin-top:48px;font-size:11px;color:var(--light);line-height:1.8;}
</style>
</head>
<body>
<div class="app">

  <div class="app-header">
    <div class="app-icon">🍴</div>
    <div>
      <div class="app-title">食べログ営業ツール ポータル</div>
      <div class="app-sub">対象エリア：千葉・東京・神奈川・埼玉</div>
    </div>
  </div>

  <div class="tools">

    <div class="tool-card">
      <div class="tool-icon research">🔍</div>
      <div class="tool-name"><a class="tool-link" href="https://wa-ra-so.github.io/sinntenn/">新店リサーチ</a></div>
      <div class="tool-desc">対象都県の新規開店飲食店をニュース・求人情報から自動収集し一覧表示。提案アプローチのタイミングを逃さない。</div>
      <div class="tool-freq"><span class="dot"></span>1日6回更新</div>
      <div class="pref-row">
        <a class="pref-link" href="https://wa-ra-so.github.io/sinntenn/">千葉</a>
        <a class="pref-link" href="https://wa-ra-so.github.io/sinntenn/?pref=tokyo">東京</a>
        <a class="pref-link" href="https://wa-ra-so.github.io/sinntenn/?pref=kanagawa">神奈川</a>
        <a class="pref-link" href="https://wa-ra-so.github.io/sinntenn/?pref=saitama">埼玉</a>
      </div>
    </div>

    <div class="tool-card">
      <div class="tool-icon attack">📋</div>
      <div class="tool-name"><a class="tool-link" href="https://wa-ra-so.github.io/hppzaiko/">アタックリスト</a></div>
      <div class="tool-desc">ホットペッパー掲載店の台帳を追跡し、ネット予約不可・解約・新規掲載を検出。架電の優先順位づけに使う。</div>
      <div class="tool-freq"><span class="dot"></span>1時間おき更新</div>
      <div class="pref-row">
        <a class="pref-link" href="https://wa-ra-so.github.io/hppzaiko/">千葉</a>
        <a class="pref-link" href="https://wa-ra-so.github.io/hppzaiko/?pref=tokyo">東京</a>
        <a class="pref-link" href="https://wa-ra-so.github.io/hppzaiko/?pref=kanagawa">神奈川</a>
        <a class="pref-link" href="https://wa-ra-so.github.io/hppzaiko/?pref=saitama">埼玉</a>
      </div>
    </div>

  </div>

  <div class="other">
    <div class="other-label">その他のツール</div>
    <a class="other-link" href="https://wa-ra-so.github.io/sinntenn/seiseikun.html">📝 提案書セイセイ君</a>
  </div>

  <div class="footer">
    新店リサーチ・アタックリストは自動収集のため、掲載漏れ・誤検出が発生する場合があります。<br>
    誤りに気づいた場合は各ツールの担当者まで連絡してください。
  </div>

</div>
</body>
</html>

name: 新店情報の自動更新

on:
  schedule:
    # 1日6回実行（勤務時間10:00〜19:00 JSTの間、最新情報を保つため2時間おきに更新）。
    # 0:00,2:00,4:00,6:00,8:00,10:00 UTC = 9:00/11:00/13:00/15:00/17:00/19:00 JST
    - cron: '0 0,2,4,6,8,10 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      # 収集ロジックやワークフローが更新されたら即座に再収集する
      - 'scripts/fetch-stores.mjs'
      - 'scripts/prefectures.mjs'
      - 'scripts/test-filters.mjs'
      - '.github/workflows/update-shinten.yml'

permissions:
  contents: write

jobs:
  update-stores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # フィルタの単体テスト。失敗したら収集せずに止める
      # （事件ニュース・対象外業態・チェーン・他県記事が掲載されない基準を守る）
      - name: Test filters
        run: node scripts/test-filters.mjs

      # 4県分を順に収集。1県が失敗しても他県は収集を続ける
      # （スクリプト内部でも、ソース単位の失敗は他ソースに影響しない設計）
      - name: Fetch new store data
        run: |
          failed=0
          for pref in chiba tokyo kanagawa saitama; do
            echo "=== ${pref} ==="
            node scripts/fetch-stores.mjs --pref=${pref} || failed=1
          done
          exit ${failed}
        env:
          # リクルートWebサービス（https://webservice.recruit.co.jp/）の無料APIキー。
          # リポジトリの Settings > Secrets and variables > Actions に登録すると
          # ホットペッパー掲載チェック（●×表示）が有効になる。未設定ならスキップ。
          HOTPEPPER_API_KEY: ${{ secrets.HOTPEPPER_API_KEY }}

      # 公開前の最終監査（全県分）。収集後のデータに不適切な掲載が1件でもあれば
      # ここで失敗し、コミット（＝サイトへの公開）が行われない
      - name: Audit collected data
        run: node scripts/test-filters.mjs --audit

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: 新店情報を自動更新 ($(date -u +%Y-%m-%dT%H:%M) UTC)"
            git push
          fi


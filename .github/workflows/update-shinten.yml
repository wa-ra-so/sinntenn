name: 新店情報の自動更新

on:
  schedule:
    # 1日3回実行（ホットペッパーのネット予約チェックのローテーションを速めるため）。
    # 21:00 UTC=06:00 JST / 5:00 UTC=14:00 JST / 13:00 UTC=22:00 JST
    - cron: '0 21,5,13 * * *'
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      # 収集ロジックやワークフローが更新されたら即座に再収集する
      - 'scripts/fetch-stores.mjs'
      - 'scripts/prefectures.mjs'
      - 'scripts/test-filters.mjs'
      - 'scripts/hotpepper-roster.mjs'
      - '.github/workflows/update-shinten.yml'

permissions:
  contents: write

jobs:
  update-stores:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # フィルタの単体テスト。失敗したら収集せずに止める
      # （事件ニュース・対象外業態・チェーン・他県記事が掲載されない基準を守る）
      - name: Test filters
        run: node scripts/test-filters.mjs

      # 4県分を順に収集。1県が失敗しても他県は収集を続ける
      # （スクリプト内部でも、ソース単位の失敗は他ソースに影響しない設計）
      - name: Fetch new store data
        run: |
          failed=0
          for pref in chiba tokyo kanagawa saitama; do
            echo "=== ${pref} ==="
            node scripts/fetch-stores.mjs --pref=${pref} || failed=1
          done
          exit ${failed}
        env:
          # リクルートWebサービス（https://webservice.recruit.co.jp/）の無料APIキー。
          # リポジトリの Settings > Secrets and variables > Actions に登録すると
          # ホットペッパー掲載チェック（●×表示）が有効になる。未設定ならスキップ。
          HOTPEPPER_API_KEY: ${{ secrets.HOTPEPPER_API_KEY }}

      # 公開前の最終監査（全県分）。収集後のデータに不適切な掲載が1件でもあれば
      # ここで失敗し、コミット（＝サイトへの公開）が行われない
      - name: Audit collected data
        run: node scripts/test-filters.mjs --audit

      # ホットペッパー掲載台帳の更新（4県分）。全掲載店（千葉5,228・東京33,088・
      # 神奈川9,749・埼玉5,329店）を毎回取得し、未チェック・チェックが古い店から
      # 一部ずつ店舗ページのネット予約表示を確認する（1日3回実行×800件/回の
      # ローテーションで、店舗数の少ない県は数日、店舗数が多い東京は2週間ほどで一巡）。
      # 1県が失敗しても他県は続行し、新店リサーチの公開も止めない
      - name: Update HotPepper roster (chiba)
        run: node scripts/hotpepper-roster.mjs --pref=chiba || echo "::warning::HotPepper roster update failed (chiba)"
        env:
          HOTPEPPER_API_KEY: ${{ secrets.HOTPEPPER_API_KEY }}

      - name: Update HotPepper roster (tokyo)
        run: node scripts/hotpepper-roster.mjs --pref=tokyo || echo "::warning::HotPepper roster update failed (tokyo)"
        env:
          HOTPEPPER_API_KEY: ${{ secrets.HOTPEPPER_API_KEY }}

      - name: Update HotPepper roster (kanagawa)
        run: node scripts/hotpepper-roster.mjs --pref=kanagawa || echo "::warning::HotPepper roster update failed (kanagawa)"
        env:
          HOTPEPPER_API_KEY: ${{ secrets.HOTPEPPER_API_KEY }}

      - name: Update HotPepper roster (saitama)
        run: node scripts/hotpepper-roster.mjs --pref=saitama || echo "::warning::HotPepper roster update failed (saitama)"
        env:
          HOTPEPPER_API_KEY: ${{ secrets.HOTPEPPER_API_KEY }}

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No changes"
          else
            git commit -m "chore: 新店情報を自動更新 ($(date -u +%Y-%m-%dT%H:%M) UTC)"
            git push
          fi

